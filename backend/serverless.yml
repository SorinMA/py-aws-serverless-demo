# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: sorinache
# "service" is the name of this project. This will also be added to your AWS resource names.
service: backend

provider:
  name: aws
  runtime: python3.12
  profile: serverlessDev
  region: eu-north-1
  stage: ${self:custom.stage}
  apiGateway:
    apiKeys:
      - ${self:service}-${self:custom.stage}-api-key
    usagePlan:
      throttle:
        rateLimit: 10
        burstLimit: 15
  environment:
    USER_TABLE_NAME: ${self:custom.userTableName}
    CORS_ALLOW_ORIGIN:
      Fn::Sub:
        - "https://${FrontendDomain}"
        - FrontendDomain:
            Fn::ImportValue: ${self:custom.frontendService}-${self:custom.stage}-CloudFrontDomainName
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:UpdateItem
        - dynamodb:GetItem
        - dynamodb:Query
        - dynamodb:PutItem
        - dynamodb:DeleteItem
      Resource:
        - !GetAtt UsersTable.Arn
        - !Sub "${UsersTable.Arn}/index/*"  # Permissions for GSIs
# TODO: Re-enable S3 permissions when S3 endpoints are added (least privilege)
#    - Effect: Allow
#      Action:
#        - s3:PutObject
#        - s3:GetObject
#        - s3:DeleteObject
#      Resource:
#        - !GetAtt TextFilesStorageBucket.Arn
#        - !Sub "${TextFilesStorageBucket.Arn}/*"
  # Uncomment to easily set up a custom domain. Read the docs for more details:
  # https://www.serverless.com/framework/docs/providers/aws/guide/domains
  # domain: api.example.com

custom:
  frontendService: frontend
  stage: ${opt:stage, 'dev'}
  userTableName: ${self:service}-${self:custom.stage}-user-management
  textFilesStorageBucketName: ${self:service}-${self:custom.stage}-${aws:accountId}-${aws:region}-textfiles

functions:
  postConfirmation:
    handler: lambdas/postConfirmation.lambda_handler
  getUser:
    handler: lambdas/getUser.lambda_handler
    events:
      - http:
          path: get-user/{email}
          method: get
          private: true # comment and keep only cognito auth for frontend access
          authorizer:
            type: COGNITO_USER_POOLS
            authorizerId:
              Ref: ApiGatewayAuthorizer
          cors: true

resources:
  Resources:
    # TODO: When S3 endpoints are added, enable:
    # - PublicAccessBlockConfiguration
    # - VersioningConfiguration
    # - BucketEncryption
    TextFilesStorageBucket:
      Type: AWS::S3::Bucket
      #DeletionPolicy: Retain
      #UpdateReplacePolicy: Retain
      Properties:
        BucketName: ${self:custom.textFilesStorageBucketName}
    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.userTableName}
        AttributeDefinitions:
          - AttributeName: email
            AttributeType: S
          - AttributeName: name
            AttributeType: S
          - AttributeName: updatedDate
            AttributeType: S
        KeySchema:
          - AttributeName: email
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
        GlobalSecondaryIndexes:
          - IndexName: name-index
            KeySchema:
              - AttributeName: name
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: name-updatedDate-index
            KeySchema:
              - AttributeName: name
                KeyType: HASH
              - AttributeName: updatedDate
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: ${self:service}-${self:custom.stage}-user-pool
        UsernameAttributes:
          - email
        AutoVerifiedAttributes:
          - email
        LambdaConfig:
          PostConfirmation:
            Fn::GetAtt: [ PostConfirmationLambdaFunction, Arn ]
    PostConfirmationLambdaInvokePermission:
      Type: AWS::Lambda::Permission
      Properties:
        Action: lambda:InvokeFunction
        FunctionName:
          Fn::GetAtt: [ PostConfirmationLambdaFunction, Arn ]
        Principal: cognito-idp.amazonaws.com
        SourceArn:
          Fn::GetAtt: [ CognitoUserPool, Arn ]
    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: ${self:service}-${self:custom.stage}-user-pool-client
        UserPoolId: !Ref CognitoUserPool
        GenerateSecret: false
        ExplicitAuthFlows:
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_USER_SRP_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
        SupportedIdentityProviders:
          - COGNITO
        AllowedOAuthFlowsUserPoolClient: true
        AllowedOAuthFlows:
          - code
        AllowedOAuthScopes:
          - openid
          - email
          - profile
        CallbackURLs:
          - Fn::Sub:
              - "https://${FrontendDomain}/auth/callback"
              - FrontendDomain:
                  Fn::ImportValue: ${self:custom.frontendService}-${self:custom.stage}-CloudFrontDomainName
        LogoutURLs:
          - Fn::Sub:
              - "https://${FrontendDomain}/"
              - FrontendDomain:
                  Fn::ImportValue: ${self:custom.frontendService}-${self:custom.stage}-CloudFrontDomainName
    CognitoUserPoolDomain:
      Type: AWS::Cognito::UserPoolDomain
      Properties:
        Domain: ${self:service}-${self:custom.stage}-${aws:accountId}-cupd
        UserPoolId: !Ref CognitoUserPool
    ApiGatewayAuthorizer:
      Type: AWS::ApiGateway::Authorizer
      Properties:
        Name: ${self:service}-${self:custom.stage}-cognito-authorizer
        Type: COGNITO_USER_POOLS
        IdentitySource: method.request.header.Authorization
        RestApiId:
          Ref: ApiGatewayRestApi
        ProviderARNs:
          - !GetAtt CognitoUserPool.Arn
  Outputs:
    CognitoUserPoolId:
      Value: !Ref CognitoUserPool
    CognitoUserPoolClientId:
      Value: !Ref CognitoUserPoolClient
    # 1) API base URL: https://{apiId}.execute-api.{region}.amazonaws.com/{stage}
    ApiBaseUrl:
      Value:
        Fn::Sub:
          - "https://${ApiId}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
          - ApiId:
              Ref: ApiGatewayRestApi
            Stage: ${self:custom.stage}

    # 2) OIDC authority using the "cognito-idp region + userPoolId" style
    #    https://cognito-idp.{region}.amazonaws.com/{userPoolId}
    OidcAuthority:
      Value:
        Fn::Sub:
          - "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPoolId}"
          - UserPoolId: !Ref CognitoUserPool

    # 3) OIDC client id (same as CognitoUserPoolClientId, but named for frontend usage)
    OidcClientId:
      Value: !Ref CognitoUserPoolClient

    # 4) OIDC redirect URI (where Cognito sends the browser after login)
    #    Uses the SAME frontend CloudFront domain import you already use in CallbackURLs.
    OidcRedirectUri:
      Value:
        Fn::Sub:
          - "https://${FrontendDomain}/auth/callback"
          - FrontendDomain:
              Fn::ImportValue: ${self:custom.frontendService}-${self:custom.stage}-CloudFrontDomainName
    OidcPostLogoutRedirectUri:
      Value:
        Fn::Sub:
          - "https://${FrontendDomain}/"
          - FrontendDomain:
              Fn::ImportValue: ${self:custom.frontendService}-${self:custom.stage}-CloudFrontDomainName
    CognitoHostedUiDomain:
      Value:
        Fn::Sub:
          - "https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com"
          - DomainPrefix: ${self:service}-${self:custom.stage}-${aws:accountId}-cupd