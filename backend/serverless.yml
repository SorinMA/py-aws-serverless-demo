# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: sorinache
# "service" is the name of this project. This will also be added to your AWS resource names.
service: backend

provider:
  name: aws
  runtime: python3.12
  profile: serverlessDev
  region: eu-north-1
  apiKeys:
    - ${self:service}-${sls:stage}-api-key
  usagePlan:
    throttle:
      rateLimit: 10
      burstLimit: 15
  environment:
    USER_TABLE_NAME: ${self:custom.userTableName}
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:UpdateItem
        - dynamodb:GetItem
        - dynamodb:Query
        - dynamodb:PutItem
        - dynamodb:DeleteItem
      Resource:
        - !GetAtt UsersTable.Arn
        - !Sub "${UsersTable.Arn}/index/*"  # Permissions for GSIs
# TODO: Re-enable S3 permissions when S3 endpoints are added (least privilege)
#    - Effect: Allow
#      Action:
#        - s3:PutObject
#        - s3:GetObject
#        - s3:DeleteObject
#      Resource:
#        - !GetAtt TextFilesStorageBucket.Arn
#        - !Sub "${TextFilesStorageBucket.Arn}/*"
  # Uncomment to easily set up a custom domain. Read the docs for more details:
  # https://www.serverless.com/framework/docs/providers/aws/guide/domains
  # domain: api.example.com

custom:
  userTableName: ${self:service}-${sls:stage}-user-management
  textFilesStorageBucketName: ${self:service}-${sls:stage}-${aws:accountId}-${aws:region}-textfiles

functions:
  getUser:
    handler: lambdas/getUser.lambda_handler
    events:
      - http:
          path: get-user/{email}
          method: get
          private: true
#          cors: true # temporary disabled until a frontend is added

resources:
  Resources:
    # TODO: When S3 endpoints are added, enable:
    # - PublicAccessBlockConfiguration
    # - VersioningConfiguration
    # - BucketEncryption
    TextFilesStorageBucket:
      Type: AWS::S3::Bucket
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        BucketName: ${self:custom.textFilesStorageBucketName}
    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.userTableName}
        AttributeDefinitions:
          - AttributeName: email
            AttributeType: S
          - AttributeName: name
            AttributeType: S
          - AttributeName: updatedDate
            AttributeType: S
        KeySchema:
          - AttributeName: email
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
        GlobalSecondaryIndexes:
          - IndexName: name-index
            KeySchema:
              - AttributeName: name
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: name-updatedDate-index
            KeySchema:
              - AttributeName: name
                KeyType: HASH
              - AttributeName: updatedDate
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
